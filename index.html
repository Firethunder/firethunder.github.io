<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firethunder Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen flex flex-col items-center">

    <!-- Header -->
    <header class="w-full bg-red-700 text-white py-12 px-4 shadow-md text-center">
        <h1 class="text-4xl font-extrabold tracking-tight mb-2">Firethunder</h1>
        <p class="text-red-100 text-lg opacity-90">Simple Tools & Data</p>
    </header>

    <!-- Simple Container -->
    <main class="max-w-xl w-full flex-grow py-16 px-4">
        <div class="grid gap-4">
            <!-- Tool Card -->
            <a href="./ffwtool/" class="group block p-6 bg-white border border-gray-200 rounded-2xl shadow-sm hover:border-red-600 hover:shadow-md transition-all duration-300">
                <div class="flex items-center justify-between">
                    <div>
                        <h2 class="text-xl font-bold mb-1 group-hover:text-red-700 transition-colors">FFW-Tool</h2>
                        <p class="text-gray-500">Terminverwaltung & Mannschaft</p>
                    </div>
                    <div class="text-gray-300 group-hover:text-red-600 transition-colors">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                    </div>
                </div>
            </a>

            <!-- Placeholder for future tools -->
            <div class="p-6 bg-gray-100 border border-gray-200 rounded-2xl opacity-60">
                <h2 class="text-xl font-bold mb-1 italic text-gray-400">Next Tool...</h2>
                <p class="text-gray-400">More tools coming soon</p>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="w-full max-w-xl py-12 text-center border-t border-gray-200 mx-4">
        <div class="flex justify-center space-x-6 mb-6">
            <a href="./policy.html" class="text-sm text-gray-500 hover:text-red-700 transition-colors">Datenschutz</a>
            <a href="./tos.html" class="text-sm text-gray-500 hover:text-red-700 transition-colors">Impressum & Nutzungsbedingungen</a>
        </div>
        <p class="text-gray-400 text-xs">&copy; 2026 Firethunder</p>
    </footer>

</body>
</html>
